<br>

<div id="day-content"></div>

      "<p>\n" +

      "\n" +
      "  <br><br>A brief reminder that the store resets by tonight, so buy out as much as you can.",

      "  <br>✅ Gather coins, food, or iron\n" +

      "  <br>✅ Using drone parts\n" +
      "  <br>✅ Consuming stamina (use when the Radar Training Arms Race has started)\n" +

      "\n" +

      "  <br>🚫 Use Hero Shards, Hero EXP, Skill Medals\n" +
      "  <br>🚫 Recruit Heroes or Survivors\n" +
      "  <br>🚫 Use speed-ups\n" +

      "\n" +
      "  <br><br>We would love if you unwrap your headquarters on Construction Day, as this can make us proud!\n" +
      "</p>",

      "<p>\n" +
      "  Ready to expand your base? Today’s construction day, which means our construction workers are busy constructing our buildings. They can provide a lot for our heroes and our troops, but most importantly, it increases power. Here’s what you can do:\n" +
      "\n" +
      "  <br>✅ Increase building power by unwrapping buildings (use when the Base Building Arms Race has started)\n" +
      "  <br>✅ Use construction speed-ups or universal speed-ups for construction (use when the Base Building Arms Race has started)\n" +
      "  <br>✅ Recruit survivors (hold out until the last 10 minutes)\n" +
      "  <br>✅ Dispatch gold trucks and tasks (including red-star)\n" +

      "  <br>🚫 Open any level drone component chests\n" +

      "  <br>🚫 Recruit Heroes or Survivors\n" +
      "  <br>🚫 Use Construction speed-ups\n" +
      "  <br>🚫 Level up your Overlord\n" +

      "  <br>✅ Recruit heroes (use when the Hero Advancement Arms Race has started)\n" +
      "  <br>✅ Use hero shards\n" +
      "  <br>✅ Use hero skill medals\n" +
      "  <br>✅ Use exclusive weapons\n" +

      "\n" +
      "\n" +
      "\n" +
      "  <br><br>Planning to fight? Follow these actions:\n" +
      "  <br>◦ Kill any level unit in the opposing alliance\n" +
      "  <br>◦ Kill any level unit in any other alliance in the opposing war zone\n" +
      "\n" +
      "\n" +
      "  <br><br>Defending your base or not strong enough to fight? Follow these actions:\n" +

      "\n" +
      "  <br><br><img src=\"war.png\">\n" +
      "</p>\n" +

  window.onload = displayDailyContent;
</script>
